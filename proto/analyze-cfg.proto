syntax = "proto3";

package analyze;


option go_package = "./proto";

service CfgAnalyzer {
    rpc Analyze(AnalyzeRequest) returns (AnalyzeResponse);
}

message AnalyzeRequest {
    ServerConfig server = 1;
    DatabaseConfig database = 2;
    StorageConfig storage = 3;
    LogConfig log = 4;
}

message AnalyzeResponse {
    repeated Problem problems = 2;
}


message ServerConfig {
    string host = 1;
    bool tls_verify = 2;
}

message DatabaseConfig {
    string password = 1;
}

message StorageConfig {
    string path = 1;
    string permissions = 2;
    string digest_algorithm = 3;
}

message LogConfig {
    string output = 1;
    string level = 2;
}

message Problem {
    string filename = 1;
    string path = 2;
    string description = 3;
    string recommendation = 4;
    string severity = 5;
}